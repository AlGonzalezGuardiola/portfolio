<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="meta-desc" name="description"
        content="Álvaro — DevOps & Cloud Engineer. Get in touch via email, GitHub or LinkedIn." />
    <title>Álvaro — Contact</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="page-inner" data-page="contact">

    <!-- ===================== HEADER ===================== -->
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Álvaro</a>

            <div class="header-right">
                <div class="lang-switcher" role="group" aria-label="Language selector">
                    <button class="lang-btn" id="langEN" data-lang="en" aria-pressed="true">EN</button>
                    <span class="lang-sep" aria-hidden="true">/</span>
                    <button class="lang-btn" id="langES" data-lang="es" aria-pressed="false">ES</button>
                </div>

                <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>

                <nav class="main-nav" id="mainNav" aria-label="Main navigation">
                    <ul>
                        <li><a href="index.html" data-i18n="nav-home">Home</a></li>
                        <li><a href="about.html" data-i18n="nav-about">About</a></li>
                        <li><a href="projects.html" data-i18n="nav-projects">Projects</a></li>
                        <li><a href="skills.html" data-i18n="nav-skills">Skills</a></li>
                        <li><a href="contact.html" data-i18n="nav-contact">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- ===================== MAIN ===================== -->
    <main>
        <section class="page-section" id="contact">
            <div class="container section-inner">
                <span class="section-label" data-i18n="label-contact">Get in touch</span>
                <h1 class="section-title" data-i18n="title-contact">Contact</h1>

                <p class="contact-sub reveal" data-i18n="contact-sub">
                    Interested in working together? Feel free to reach out — I'm open to remote and hybrid
                    opportunities.
                </p>

                <div class="contact-links reveal">
                    <a href="mailto:your-email@domain.com" class="contact-btn contact-btn-primary"
                        aria-label="Send me an email">
                        your-email@domain.com
                    </a>
                    <a href="#" class="contact-btn contact-btn-ghost" aria-label="Visit my GitHub profile">
                        GitHub ↗
                    </a>
                    <a href="#" class="contact-btn contact-btn-ghost" aria-label="Visit my LinkedIn profile">
                        LinkedIn ↗
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer class="site-footer">
        <div class="container footer-inner">
            <p data-i18n="footer-text">&copy; <span id="year"></span> Álvaro. Built with HTML, CSS &amp; a little JS.
            </p>
            <a href="#" class="back-top" data-i18n="footer-top">↑ Top</a>
        </div>
    </footer>

    <script src="main.js"></script>

</html>
